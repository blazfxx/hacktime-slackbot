<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minigames Slack Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #f5f2eb;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      color: #7fff6a;
      border: 1px solid rgba(127,255,106,0.25);
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1.2rem;
    }
    h1 span { color: #7fff6a; }
    p {
      color: rgba(245,242,235,0.5);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 2.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #7fff6a;
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(127,255,106,0.25);
    }
    .commands {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 3rem;
    }
    .cmd {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #6af0ff;
      background: rgba(106,240,255,0.06);
      border: 1px solid rgba(106,240,255,0.2);
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
    }
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: rgba(245,242,235,0.2);
    }
  </style>
</head>
<body>
  <div class="tag">Slack Bot</div>
  <h1>Play games in<br><span>your Slack.</span></h1>
  <p>Tic Tac Toe, Rock Paper Scissors, and more — directly in any channel.</p>

  <!-- Replace this href with your Slack OAuth URL after activating public distribution -->
  <a href="YOUR_SLACK_OAUTH_URL_HERE" class="btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M6 15a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm0-8a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm0 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/>
    </svg>
    Add to Slack
  </a>

  <div class="commands">
    <span class="cmd">/3t start</span>
    <span class="cmd">/rps rock</span>
    <span class="cmd">/flip</span>
    <span class="cmd">/hello</span>
  </div>

  <footer>minigames bot · free forever</footer>
</body>
</html>
